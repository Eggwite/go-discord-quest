name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    env:
      CGO_ENABLED: 0
      GOOS: windows
      GOARCH: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true

      - name: Download deps
        run: go mod download

      - name: Build stub (required for embed)
        run: |
          go build -trimpath `
            -ldflags "-H windowsgui -s -w" `
            -o internal/runner/assets/stub.exe `
            ./stub

      - name: Build main binary
        run: |
          go build -trimpath `
            -ldflags "-s -w" `
            -o dqc.exe `
            ./cmd/dqc
